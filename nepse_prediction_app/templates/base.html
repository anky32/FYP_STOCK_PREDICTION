{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPSE AI — Stock Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        teal: { 400: '#2dd4bf', 500: '#14b8a6', 300: '#5eead4' },
                        emerald: { glow: '#10b981' }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #050a0f; color: #e2e8f0; }

        /* Glow effects */
        .glow-teal { box-shadow: 0 0 20px rgba(20,184,166,0.4), 0 0 40px rgba(20,184,166,0.15); }
        .glow-teal-sm { box-shadow: 0 0 10px rgba(20,184,166,0.3); }
        .text-glow { text-shadow: 0 0 30px rgba(45,212,191,0.5); }

        /* Glass card */
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.07); }
        .glass-dark { background: rgba(5,10,15,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }

        /* Gradient text */
        .gradient-text { background: linear-gradient(135deg, #ffffff 0%, #2dd4bf 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gradient-text-green { background: linear-gradient(135deg, #2dd4bf, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        /* Buttons */
        .btn-primary { background: linear-gradient(135deg, #14b8a6, #10b981); color: #000; font-weight: 700; transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 25px rgba(20,184,166,0.4); }
        .btn-outline { border: 1px solid rgba(45,212,191,0.4); color: #2dd4bf; transition: all 0.2s; }
        .btn-outline:hover { background: rgba(45,212,191,0.08); border-color: #2dd4bf; }

        /* Nav */
        .nav-link { color: #94a3b8; transition: color 0.2s; font-size: 0.875rem; font-weight: 500; }
        .nav-link:hover, .nav-link.active { color: #2dd4bf; }

        /* Inputs */
        input, select, textarea {
            background: rgba(255,255,255,0.04) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: #e2e8f0 !important;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #14b8a6 !important;
            box-shadow: 0 0 0 3px rgba(20,184,166,0.15) !important;
        }
        select option { background: #0d1a24; }

        /* Animated grid background */
        .grid-bg {
            background-image: linear-gradient(rgba(20,184,166,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(20,184,166,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050a0f; }
        ::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 3px; }

        /* Stat number animation */
        .stat-num { font-weight: 800; font-size: 2rem; line-height: 1; }

        /* Table */
        .data-table th { color: #64748b; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .data-table td { padding: 0.875rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.875rem; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: rgba(20,184,166,0.03); }

        /* Pulse dot */
        .pulse-dot { width: 8px; height: 8px; background: #14b8a6; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }

        /* Chart image */
        .chart-img { border-radius: 12px; filter: brightness(0.95) contrast(1.05); }
    </style>
</head>
<body class="min-h-screen">

<!-- Navbar -->
<nav class="fixed top-0 left-0 right-0 z-50 glass-dark border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <!-- Logo -->
        <a href="/dashboard/" class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-teal-500 to-emerald-500 flex items-center justify-center glow-teal-sm">
                <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                </svg>
            </div>
            <span class="font-bold text-lg text-white">NEPSE<span class="text-teal-400">AI</span></span>
        </a>

        <!-- Nav Links -->
        <div class="hidden md:flex items-center gap-1">
            <div class="w-px h-4 bg-white/10 mx-2"></div>
            <a href="/dashboard/" class="nav-link px-4 py-2 rounded-lg {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/predict/" class="nav-link px-4 py-2 rounded-lg flex items-center gap-1.5 {% if request.resolver_match.url_name == 'predict' %}active{% endif %}">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                Predict
            </a>
            <a href="/analysis/" class="nav-link px-4 py-2 rounded-lg flex items-center gap-1.5 {% if request.resolver_match.url_name == 'analysis' %}active{% endif %}">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Analysis
            </a>
            <a href="/feedback/" class="nav-link px-4 py-2 rounded-lg {% if request.resolver_match.url_name == 'feedback' %}active{% endif %}">Feedback</a>
        </div>

        <!-- Auth -->
        <div class="flex items-center gap-3">
            {% if user.is_authenticated %}
            <div class="hidden md:flex items-center gap-2 px-3 py-1.5 glass rounded-lg">
                <div class="w-6 h-6 rounded-full bg-gradient-to-br from-teal-500 to-emerald-500 flex items-center justify-center text-black text-xs font-bold">{{ user.username|first|upper }}</div>
                <span class="text-slate-300 text-sm">{{ user.username }}</span>
            </div>
            <a href="/logout/" class="btn-outline px-4 py-2 rounded-lg text-sm font-medium">Logout</a>            {% else %}
            <a href="/login/" class="nav-link px-4 py-2">Log in</a>
            <a href="/register/" class="btn-primary px-5 py-2 rounded-lg text-sm">Get Started</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Page Content -->
<div class="pt-16">
    {% block content %}{% endblock %}
</div>

</body>
</html>
