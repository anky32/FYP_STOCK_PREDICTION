<!DOCTYPE html>
<html>
<head>
    <title>Model Comparison</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 75%;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-top: 40px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background: #007bff;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

<h2>📊 Model Comparison Dashboard</h2>

<!-- 🔥 GRAPH -->
<div class="section">
    <h3>📈 Model Performance Chart</h3>
    <img src="data:image/png;base64,{{ graph }}" width="700">
</div>

<!-- 🔥 TABLE -->
<table>
<tr>
    <th>Stock</th>
    <th>ARIMA MAE</th>
    <th>LSTM MAE</th>
    <th>HYBRID MAE</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row.Stock }}</td>
    <td>{{ row.ARIMA_MAE }}</td>
    <td>{{ row.LSTM_MAE }}</td>
    <td>{{ row.HYBRID_MAE }}</td>
</tr>
{% endfor %}
</table>

</div>

</body>
</html>
