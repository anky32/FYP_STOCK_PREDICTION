{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center relative py-20">
    <!-- Background glow -->
    <div class="absolute inset-0 grid-bg opacity-40"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full" style="background: radial-gradient(circle, rgba(20,184,166,0.06) 0%, transparent 70%);"></div>

    <div class="relative w-full max-w-md px-6">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2.5 mb-4">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-emerald-500 flex items-center justify-center glow-teal">
                    <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                </div>
                <span class="font-black text-2xl text-white">NEPSE<span class="text-teal-400">AI</span></span>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Welcome back</h1>
            <p class="text-slate-400 text-sm">Sign in to access your predictions</p>
        </div>

        <div class="glass rounded-2xl p-8 border border-white/6">
            {% if error %}
            <div class="flex items-center gap-3 bg-red-500/8 border border-red-500/20 rounded-xl px-4 py-3 mb-6">
                <svg class="w-4 h-4 text-red-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                </svg>
                <span class="text-red-400 text-sm">{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Username or Email</label>
                    <input type="text" name="username" placeholder="Enter username or email" required
                        class="w-full px-4 py-3.5 rounded-xl text-sm placeholder-slate-600">
                </div>
                <div>
                    <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="login_password" placeholder="Enter your password" required
                            class="w-full px-4 py-3.5 pr-12 rounded-xl text-sm placeholder-slate-600">
                        <button type="button" onclick="togglePw('login_password', 'login_eye')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-teal-400 transition-colors">
                            <svg id="login_eye" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full py-3.5 rounded-xl text-sm font-bold mt-2 flex items-center justify-center gap-2">
                    Sign In
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-white/5 text-center">
                <p class="text-slate-500 text-sm">Don't have an account? <a href="/register/" class="text-teal-400 hover:text-teal-300 font-semibold transition-colors">Create one free</a></p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

<script>
function togglePw(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.innerHTML = show
        ? `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
}
</script>
