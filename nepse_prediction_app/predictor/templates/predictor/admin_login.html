{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center relative py-20">
    <div class="absolute inset-0 grid-bg opacity-40"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full"
         style="background: radial-gradient(circle, rgba(239,68,68,0.06) 0%, transparent 70%);"></div>

    <div class="relative w-full max-w-md px-6">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2.5 mb-4">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-red-500 to-orange-500 flex items-center justify-center"
                     style="box-shadow:0 0 16px rgba(239,68,68,0.4);">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                    </svg>
                </div>
                <span class="font-black text-2xl text-white">NEPSE<span class="text-red-400">AI</span></span>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Admin Access</h1>
            <p class="text-slate-400 text-sm">Restricted to administrators only</p>
        </div>

        <div class="glass rounded-2xl p-8 border border-red-500/15">
            {% if error %}
            <div class="flex items-center gap-3 bg-red-500/8 border border-red-500/20 rounded-xl px-4 py-3 mb-6">
                <svg class="w-4 h-4 text-red-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                </svg>
                <span class="text-red-400 text-sm">{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Admin Username</label>
                    <input type="text" name="username" placeholder="Enter admin username" required
                        class="w-full px-4 py-3.5 rounded-xl text-sm placeholder-slate-600">
                </div>
                <div>
                    <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="admin_pw" placeholder="Enter password" required
                            class="w-full px-4 py-3.5 pr-12 rounded-xl text-sm placeholder-slate-600">
                        <button type="button" onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-red-400 transition-colors">
                            <svg id="eye_icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit"
                    class="w-full py-3.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 text-white"
                    style="background: linear-gradient(135deg,#ef4444,#f97316); transition: opacity 0.2s;"
                    onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
                    </svg>
                    Sign In as Admin
                </button>
            </form>

            <div class="mt-6 pt-5 border-t border-white/5 text-center">
                <a href="/login/" class="text-slate-500 hover:text-slate-400 text-sm transition-colors">← Back to User Login</a>
            </div>
        </div>
    </div>
</div>

<script>
function togglePw() {
    const inp = document.getElementById('admin_pw');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
